<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <title>my map</title>
    <meta charset="utf-8" />
    <viewport content="width=device-width, initial-scale=1.0">
        <!--importing required libraries and stylesheets for maplibre-gl-->

        <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
        <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet">
        <style>
            body {
                margin: 0;
                padding: 0;
            }

            #map {
                width: 100%;
                height: 100vh;
                top: 0;
                z-index: -1;
                position: fixed;
            }

            input[type="search"] {
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 1000;
                width: 300px;
                padding: 10px;
                border-radius: 20px;
                border: 1px solid #ccc;
                box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.1);
                font-family: 'Poppins', sans-serif;
            }

            .menu-button {
                position: absolute;
                bottom: 20px;
                left: 20px;
                width: 30px;
                border-radius: 30px;
                padding: 20px;
                border: 1px solid #ccc;
                cursor: pointer;
            }

            * {
                box-sizing: border-box;
            }

            form {
                position: absolute;
                top: 20px;
                left: 20px;
                z-index: 1001;
                display: flex;
                gap: 8px;
            }

            .autocomplete {
                position: relative;
                display: inline-block;
                width: 300px;
            }

            input {
                position: relative;
                border: 1px solid transparent;
                padding: 10px;
                font-size: 13px;
                font-family: 'Poppins', sans-serif;
                border-radius: 13px;
                box-shadow: #ccc 1px 1px 5px;
            }

            input[type=text] {
                background-color: #fdfcfc;
                width: 100%;
            }

            .container button {
                width: 100%;
            }

            button[type="submit"] {
                color: rgb(106, 109, 111);
                position: relative;
                background-color: transparent;
                border: none;
                cursor: pointer;
                width: 100%;
                height: 100%;
                top: 1.5px;
                left: -50px;
                z-index: 1;
            }

            .autocomplete-items {
                position: absolute;
                border: 1px solid #d4d4d4;
                border-bottom: none;
                border-top: none;
                border-radius: 13px;
                background-color: #ffffff;
                color: #333333;
                z-index: 99;
                top: 100%;
                left: 0;
                right: 0;
                font-family: 'Poppins', sans-serif;
                font-size: 12px;
            }

            .autocomplete-items div {
                padding: 10px 12px;
                cursor: pointer;
                position: relative;
                border-bottom: 1px solid #d4d4d4;
                border-radius: 0;
                left: 0;
            }

            .autocomplete-items div:hover {
                /*when hovering an item:*/
                background-color: #e9e9e9;
            }

            .autocomplete-active {
                /*when navigating through the items using the arrow keys:*/
                background-color: DodgerBlue !important;
            }

            .maplibregl-ctrl-group {
                display: none;
            }

            #locateBtn {
                position: absolute;
                background-color: rgb(106, 109, 111);
                color: #fff;
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.15);
                cursor: pointer;
                left: 330px;
                font-size: 18px;
            }

            #settingsBtn {
                position: absolute;
                top: 20px;
                right: 20px;
                z-index: 1001;
                background-color: rgb(106, 109, 111);
                color: #fff;
                border: none;
                border-radius: 50%;
                width: 40px;
                height: 40px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.15);
                cursor: pointer;
            }

            #settingsPanel {
                position: fixed;
                top: 0;
                right: -300px;
                width: 280px;
                height: 100vh;
                background: rgba(255, 255, 255, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                z-index: 1002;
                box-shadow: -4px 0 24px rgba(0, 0, 0, 0.12);
                padding: 24px 20px;
                transition: right 0.3s ease;
                font-family: 'Poppins', sans-serif;
                border-left: 1px solid rgba(0, 0, 0, 0.08);
            }

            #settingsPanel h2 {
                margin-top: 35px;
                margin-bottom: 20px;
                font-size: 16px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: #999;
                text-align: center;
                padding-bottom: 16px;
                border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            }

            .toggle-label {
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 14px;
                font-weight: 500;
                color: #222;
                padding: 12px 0;
                border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            }

            .toggle-switch {
                position: relative;
                width: 46px;
                height: 26px;
            }

            .toggle-switch input {
                opacity: 0;
                width: 0;
                height: 0;
                box-shadow: none;
            }

            .toggle-slider {
                position: absolute;
                cursor: pointer;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #ccc;
                border-radius: 26px;
                transition: 0.3s;
            }

            .toggle-slider:before {
                content: "";
                position: absolute;
                height: 20px;
                width: 20px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                border-radius: 50%;
                transition: 0.3s;
            }

            input:checked+.toggle-slider {
                background-color: rgb(106, 109, 111);
            }

            input:checked+.toggle-slider:before {
                transform: translateX(20px);
            }
        </style>
</head>

<body>
    <!--auto complete search bar, source: W3Schools-->
    <form autocomplete="off" action="action_page.php" method="post">
        <div class="autocomplete" style="width:300px;">
            <input id="myInput" type="text" name="myCountry" placeholder="Where would you like to go?">
        </div>
        <div class="container">
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </button>
        </div>
        <button type="button" id="locateBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="2" x2="12" y2="6" />
                <line x1="12" y1="18" x2="12" y2="22" />
                <line x1="2" y1="12" x2="6" y2="12" />
                <line x1="18" y1="12" x2="22" y2="12" />
            </svg>
        </button>
    </form>
    <!--map container-->
    <div id="map"></div>

    <button type="button" id="settingsBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
    </button>

    <div id="settingsPanel">
        <h2>Settings</h2>
        <!--dark mode toggle switch, source: https://www.w3schools.com/howto/howto_css_switch.asp-->
        <label class="toggle-label">
            <span>Dark Mode</span>
            <div class="toggle-switch">
                <input type="checkbox" id="darkModeToggle">
                <span class="toggle-slider"></span>
            </div>
        </label>
    </div>


    <script>
        //initialize map
        const map = new maplibregl.Map({
            style: './custom_style_bright_v0.4.json',
            center: [-91.666, 44.055], //sets the center of the map
            zoom: 9.5, //sets the zoom level of the map
            container: 'map', //put map in the div
            pitch: 20, //sets the pitch of the map
        });
        //add controls (from maplibre-gl)
        map.addControl(new maplibregl.NavigationControl());

        // Add geolocate control to the map.
        const geolocate = new maplibregl.GeolocateControl({
            positionOptions: {
                enableHighAccuracy: true
            },
            trackUserLocation: true, // Keep the dot updated as the user moves
            showUserLocation: true   // Show the blue dot icon
        });

        map.addControl(geolocate);

        //Automatically trigger the "locate me" action on load
        map.on('load', () => {
            geolocate.trigger();

            //event listener for the "locate me" button to trigger the geolocate control
            document.getElementById("locateBtn").addEventListener("click", () => {
                geolocate.trigger();
            });

            //event listener for the settings button to toggle the settings panel
            document.getElementById("settingsBtn").addEventListener("click", () => {
                const panel = document.getElementById("settingsPanel");
                panel.style.right = panel.style.right === "0px" ? "-300px" : "0px";
            });

            //eventlistener for closing the settings panel when clicking outside of it
            document.addEventListener("click", (e) => {
                const panel = document.getElementById("settingsPanel");
                const settingsBtn = document.getElementById("settingsBtn");
                if (!panel.contains(e.target) && !settingsBtn.contains(e.target)) {
                    panel.style.right = "-300px";
                }
            });

            //event listener for toggling the map style between light and dark mode
            document.getElementById("darkModeToggle").addEventListener("change", (e) => {
                if (e.target.checked) {
                    map.setStyle('./darkmode_v0.4.json');
                } else {
                    map.setStyle('./custom_style_bright_v0.4.json');
                }
            });
        });

        // function to make the settings and geolocate panel draggable
        dragElement(document.getElementById("settingsBtn")); // src: W3Schools
        dragElement2(document.getElementById("locateBtn")); 

        function dragElement(element) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (document.getElementById("settingsBtn")) {
            document.getElementById("settingsBtn").onmousedown = dragMouseDown;
        } else {
            element.onmousedown = dragMouseDown;
        }
        function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            element.style.top = (element.offsetTop - pos2) + "px";
            element.style.left = (element.offsetLeft - pos1) + "px";
        }
        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
        }

        function dragElement2(element) {
        var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        if (document.getElementById("locateBtn")) {
            document.getElementById("locateBtn").onmousedown = dragMouseDown;
        } else {
            element.onmousedown = dragMouseDown;
        }
        function dragMouseDown(e) {
            e = e || window.event;
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }
        function elementDrag(e) {
            e = e || window.event;
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            element.style.top = (element.offsetTop - pos2) + "px";
            element.style.left = (element.offsetLeft - pos1) + "px";
        }
        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
        }
        }

        // list of suggestions for the autocomplete search bar
        var countries = ["United States", "Canada", "Mexico", "Brazil", "Argentina", "United Kingdom", "France", "Germany", "Italy", "Spain", "Russia", "China", "India", "Japan", "Australia", "East Lake Apartments", "Lakeview Drive In", "Blooming Grounds"];

        function autocomplete(inp, arr) { /*source: W3Schools*/
            /*the autocomplete function takes two arguments,
            the text field element and an array of possible autocompleted values:*/
            var currentFocus;
            /*execute a function when someone writes in the text field:*/
            inp.addEventListener("input", function (e) {
                var a, b, i, val = this.value;
                /*close any already open lists of autocompleted values*/
                closeAllLists();
                if (!val) { return false; }
                currentFocus = -1;
                /*create a DIV element that will contain the items (values):*/
                a = document.createElement("DIV");
                a.setAttribute("id", this.id + "autocomplete-list");
                a.setAttribute("class", "autocomplete-items");
                /*append the DIV element as a child of the autocomplete container:*/
                this.parentNode.appendChild(a);
                /*for each item in the array...*/
                for (i = 0; i < arr.length; i++) {
                    /*check if the item starts with the same letters as the text field value:*/
                    if (arr[i].substr(0, val.length).toUpperCase() == val.toUpperCase()) {
                        /*create a DIV element for each matching element:*/
                        b = document.createElement("DIV");
                        /*make the matching letters bold:*/
                        b.innerHTML = "<strong>" + arr[i].substr(0, val.length) + "</strong>";
                        b.innerHTML += arr[i].substr(val.length);
                        /*insert a input field that will hold the current array item's value:*/
                        b.innerHTML += "<input type='hidden' value='" + arr[i] + "'>";
                        /*execute a function when someone clicks on the item value (DIV element):*/
                        b.addEventListener("click", function (e) {
                            /*insert the value for the autocomplete text field:*/
                            inp.value = this.getElementsByTagName("input")[0].value;
                            /*close the list of autocompleted values,
                            (or any other open lists of autocompleted values:*/
                            closeAllLists();
                        });
                        a.appendChild(b);
                    }
                }
            });
            /*execute a function presses a key on the keyboard:*/
            inp.addEventListener("keydown", function (e) {
                var x = document.getElementById(this.id + "autocomplete-list");
                if (x) x = x.getElementsByTagName("div");
                if (e.keyCode == 40) {
                    /*If the arrow DOWN key is pressed,
                    increase the currentFocus variable:*/
                    currentFocus++;
                    /*and and make the current item more visible:*/
                    addActive(x);
                } else if (e.keyCode == 38) { //up
                    /*If the arrow UP key is pressed,
                    decrease the currentFocus variable:*/
                    currentFocus--;
                    /*and and make the current item more visible:*/
                    addActive(x);
                } else if (e.keyCode == 13) {
                    /*If the ENTER key is pressed, prevent the form from being submitted,*/
                    e.preventDefault();
                    if (currentFocus > -1) {
                        /*and simulate a click on the "active" item:*/
                        if (x) x[currentFocus].click();
                    }
                }
            });
            function addActive(x) {
                /*a function to classify an item as "active":*/
                if (!x) return false;
                /*start by removing the "active" class on all items:*/
                removeActive(x);
                if (currentFocus >= x.length) currentFocus = 0;
                if (currentFocus < 0) currentFocus = (x.length - 1);
                /*add class "autocomplete-active":*/
                x[currentFocus].classList.add("autocomplete-active");
            }
            function removeActive(x) {
                /*a function to remove the "active" class from all autocomplete items:*/
                for (var i = 0; i < x.length; i++) {
                    x[i].classList.remove("autocomplete-active");
                }
            }
            function closeAllLists(elmnt) {
                /*close all autocomplete lists in the document,
                except the one passed as an argument:*/
                var x = document.getElementsByClassName("autocomplete-items");
                for (var i = 0; i < x.length; i++) {
                    if (elmnt != x[i] && elmnt != inp) {
                        x[i].parentNode.removeChild(x[i]);
                    }
                }
            }
            /*execute a function when someone clicks in the document:*/
            document.addEventListener("click", function (e) {
                closeAllLists(e.target);
            });
        }
        autocomplete(document.getElementById("myInput"), countries);
    </script>

</body>

</html>
