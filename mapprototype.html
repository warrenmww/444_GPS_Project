<!DOCTYPE html>
<html lang="en" data-theme = "light">
<head>
    <title>my map</title>
    <meta charset="utf-8" />
    <viewport content="width=device-width, initial-scale=1.0">
    <!--importing required libraries and stylesheets for maplibre-gl-->
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; } 
        input[type = "search"]{
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1;
            width: 300px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.1);
            font-family: 'Poppins', sans-serif;
        }
        .menu-button {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 30px;
            border-radius: 30px;
            padding: 20px;
            background-color: white;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        :root {
            --grid-unit: 1rem;
            --border-radius-base: 0.5rem;
        }
        [data-theme="light"] {
            --color-bg: #ffffff;
            --color-fg: #000000;
        }
        [data-theme="dark"] {
            --color-bg: #000000;
            --color-fg: #ffffff;
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-fg);
            font-family: 'Poppins', sans-serif;
        }
        
    </style>
</head>
<body>

<div id="map"></div>
<input type = "search" class="maplibregl-ctrl-geocoder--input" placeholder = "Search" aria-label = "Search">
<div class = "menu">
    <button class = "menu-button" type = "button"> </button>
</div>
<button type="button" data-theme-toggle aria-label="dark theme">
    Change to dark theme (or icon here)</button>

<script>
    //initialize map
    const map = new maplibregl.Map({
        style: './custom_style_bright_v0.3.json',
        center: [-91.666, 44.055], //sets the center of the map
        zoom: 9.5, //sets the zoom level of the map
        container: 'map', //put map in the div
        pitch: 20, //sets the pitch of the map
    });
    //add controls (from maplibre-gl)
    map.addControl(new maplibregl.NavigationControl());
</script>

</body>
</html>
