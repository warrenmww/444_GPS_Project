    <div id="settingsPanel">
        <h2>Settings</h2>
        <!--dark mode toggle switch, source: https://www.w3schools.com/howto/howto_css_switch.asp-->
        <label class="toggle-label">
            <span>Dark Mode</span>

        </label>
        <label class="toggle-label2">

            </div>

    <script type="module">
        //initialize map
        const map = new maplibregl.Map({
            style: './custom_style_bright_v0.4.json',
            center: [-91.666, 44.055], //sets the center of the map
            zoom: 9.5, //sets the zoom level of the map
            container: 'map', //put map in the div
            pitch: 20, //sets the pitch of the map
            hash: "map", //syncs the map state to the URL hash
        });

        //add controls (from maplibre-gl)
        map.addControl(new maplibregl.NavigationControl());

        // Add geolocate control to the map.
        const geolocate = new maplibregl.GeolocateControl({
            positionOptions: {
                enableHighAccuracy: true
            },
            trackUserLocation: true, // Keep the dot updated as the user moves
            showUserLocation: true   // Show the blue dot icon
        });

        map.addControl(geolocate);

        //Automatically trigger the "locate me" action on load
        map.on('load', () => {
            geolocate.trigger();

            //event listener for the "locate me" button to trigger the geolocate control
            document.getElementById("locateBtn").addEventListener("click", () => {
                geolocate.trigger();
            });

            //event listener for the settings button to toggle the settings panel
            document.getElementById("settingsBtn").addEventListener("click", () => {
                const panel = document.getElementById("settingsPanel");
                panel.style.right = panel.style.right === "0px" ? "-300px" : "0px";
            });

            //eventlistener for closing the settings panel when clicking outside of it
            document.addEventListener("click", (e) => {
                const panel = document.getElementById("settingsPanel");
                const settingsBtn = document.getElementById("settingsBtn");
                if (!panel.contains(e.target) && !settingsBtn.contains(e.target)) {
                    panel.style.right = "-300px";
                }
            });

            //event listener for toggling the map style between light and dark mode
            document.getElementById("darkModeToggle").addEventListener("change", (e) => {
                if (e.target.checked) {
                    map.setStyle('./darkmode_v0.4.json');
                } else {
                    map.setStyle('./custom_style_bright_v0.4.json');
                }
            });
        });

        // function to make the settings and geolocate panel draggable
        dragElement(document.getElementById("settingsBtn"));
        dragElement2(document.getElementById("locateBtn"));

        document.getElementById("satelliteViewToggle").addEventListener("change", (e) => {
            if (e.target.checked) {
                map.setStyle({ // set to satellite view style
                    "version": 8,
                    "sources": {
                        "satellite": {
                            "type": "raster",
                            "tiles": [
                                "https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2020_3857/default/g/{z}/{y}/{x}.jpg"
                            ],
                            "tileSize": 256,
                            "attribution": "© EOX IT Services GmbH"
                        }
                    },
                    "layers": [{
                        "id": "satellite",
                        "type": "raster",
                        "source": "satellite"
                    }]
                }); // lowkey looks horrible but oh well
            } else {
                map.setStyle('./custom_style_bright_v0.4.json');
            }
        });
        // adding popups you can click on to the map
        map.on('load', () => {
            map.addSource('places', {
                'type': 'geojson',
                'data': {
                    'type': 'FeatureCollection',
                    'features': [
                        {
                            'type': 'Feature',
                            'properties': {
                                'description':
                                    '<strong>Eagan Community Center</strong><p><a target="_blank" title="Opens in a new window">Eagan Community Center</a> provides various services and programs for the community. 7:00 a.m.-6:00 p.m.</p>',
                                'icon': 'bicycle'
                            },
                            'geometry': {
                                'type': 'Point',
                                'coordinates': [-93.17200139586495, 44.844691116964896]
                                /* this is testing, some place in Eagan
                                -93.17200139586495
                                Latitude: 44.844691116964896    
                                */
                            }
                        },
                        {
                            'type': 'Feature',
                            'properties': {
                                'description':
                                    '<strong>Kryszko Commons and University Center</strong><p><a target="_blank" title="Opens in a new window">Kryszko Commons</a> where students gather for academic and social activities. 7:00 a.m.-10:00 p.m.</p>',
                                'icon': 'building'
                            },
                            'geometry': {
                                'type': 'Point', // this is for WSU kryzsko commons
                                'coordinates': [-91.64496987155572, 44.047181945605246]
                                /*
                                Longitude: -91.64496987155572
                                Latitude: 44.047181945605246  
                                ELA:
                                Longitude: -91.6292
                                Latitude: 44.0428    
                                */
                            }
                        },
                        {
                            'type': 'Feature',
                            'properties': {
                                'description':
                                    '<strong>East Lake Apartments</strong><p><a target="_blank" title="Opens in a new window">East Lake Apartments</a> is a collection of residential apartments for students.<br> Front Desk hours: 7:00 a.m.-5:00 p.m.</p>',
                                'icon': 'building'
                            },
                            'geometry': {
                                'type': 'Point', // this is for ELA
                                'coordinates': [-91.6292, 44.0428]
                                /*
                                ELA:
                                Longitude: -91.6292
                                Latitude: 44.0428    
                                */
                            }
                        }
                    ]
                }
            });

            // add a layer showing the places
            map.addLayer({
                'id': 'places',
                'type': 'symbol',
                'source': 'places',
                'layout': {
                    'icon-image': '{icon}',
                    'icon-overlap': 'always'
                }
            });

            //// comments for testing the draggable marker coordinates display
            //-93.17402812622915
            //Latitude: 44.84603995259562

            // When a click event occurs on a feature in the places layer, open a popup at the
            // location of the feature, with description HTML from its properties.
            map.on('click', 'places', (e) => {
                const coordinates = e.features[0].geometry.coordinates.slice();
                const description = e.features[0].properties.description;

                // Ensure that if the map is zoomed out such that multiple
                // copies of the feature are visible, the popup appears
                // over the copy being pointed to.
                while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
                    coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
                }

                new maplibregl.Popup()
                    .setLngLat(coordinates)
                    .setHTML(description)
                    .addTo(map);
            });

            // change the cursor to pointer when the mouse is over the places layer.
            map.on('mouseenter', 'places', () => {
                map.getCanvas().style.cursor = 'pointer';
            });

            // change it back to a pointer when it leaves.
            map.on('mouseleave', 'places', () => {
                map.getCanvas().style.cursor = '';
            });
        });

        function dragElement(element) { // make the buttons draggable
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById("settingsBtn")) {
                document.getElementById("settingsBtn").onmousedown = dragMouseDown;
            } else {
                element.onmousedown = dragMouseDown;
            }
            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        function dragElement2(element) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            if (document.getElementById("locateBtn")) {
                document.getElementById("locateBtn").onmousedown = dragMouseDown;
            } else {
                element.onmousedown = dragMouseDown;
            }
            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
        const coordinates = document.getElementById('coordinates');

        // add a draggable marker to the map and display its coordinates on dragend
        const marker = new maplibregl.Marker({ draggable: true })
            .setLngLat([-93.17402812622915, 44.84603995259562])
            .addTo(map);

        function onDragEnd() {
            const lngLat = marker.getLngLat();
            coordinates.style.display = 'block';
            coordinates.innerHTML =
                `Longitude: ${lngLat.lng}<br />Latitude: ${lngLat.lat}`;
        }

        marker.on('dragend', onDragEnd);

        // list of coordinates
        /*
        WSU
        Longitude: -91.64403383327303
        Latitude: 44.046919674641856
        */
        const locationCoordinates = {
            "Winona State University": [-91.64403383327303, 44.046919674641856],
            "East Lake Apartments": [-91.6292, 44.0428], // gonna focus on just a few locations for demo purposes 
            "Eagan Community Center": [-93.17200139586495, 44.844691116964896],
        };

        // function to move the map
        function searchToLocation(name) {
            const coords = locationCoordinates[name];
            if (coords) {
                // moves the map
                map.flyTo({
                    center: coords,
                    zoom: 15,
                    essential: true
                });

                // move the draggable marker to new spot
                marker.setLngLat(coords);

                // update coordinates display text
                const coordinatesDiv = document.getElementById('coordinates');
                coordinatesDiv.style.display = 'block';
                coordinatesDiv.innerHTML = `Longitude: ${coords[0]}<br />Latitude: ${coords[1]}`;
            }
        }
        const locationNames = Object.keys(locationCoordinates);

        // function to initialize the autocomplete search bar
        const initSearchAutocomplete = (input, data) => {
            let activeIndex = -1;

            const clearSuggestions = (exception) => {
                const lists = document.querySelectorAll(".autocomplete-items");
                lists.forEach(list => {
                    if (exception !== list && exception !== input) {
                        list.remove();
                    }
                });
            };

            // handle user typing
            input.addEventListener("input", () => {
                const query = input.value;
                clearSuggestions();

                if (!query) return;
                activeIndex = -1;

                // create container for suggestions
                const listContainer = document.createElement("div");
                listContainer.id = `${input.id}-results`;
                listContainer.className = "autocomplete-items";
                input.parentNode.appendChild(listContainer);

                // filter and build the list
                data.filter(item => item.toLowerCase().startsWith(query.toLowerCase()))
                    .forEach(match => {
                        const itemElement = document.createElement("div");

                        // highlight the matching part
                        itemElement.innerHTML = `<strong>${match.substring(0, query.length)}</strong>${match.substring(query.length)}`;
                        itemElement.innerHTML += `<input type="hidden" value="${match}">`;

                        itemElement.addEventListener("click", () => {
                            input.value = match;
                            searchToLocation(match);
                            clearSuggestions();
                        });

                        listContainer.appendChild(itemElement);
                    });
            });

            // keyboard navigation
            input.addEventListener("keydown", (e) => {
                const list = document.getElementById(`${input.id}-results`);
                let items = list ? list.getElementsByTagName("div") : [];

                if (e.key === "ArrowDown") { // if down arrow is pressed, move down the list
                    activeIndex++;
                    updateActiveItem(items);
                } else if (e.key === "ArrowUp") { // if up arrow is pressed, move up the list
                    activeIndex--;
                    updateActiveItem(items);
                } else if (e.key === "Enter") { // if enter is pressed, select active item
                    e.preventDefault();
                    if (activeIndex > -1 && items[activeIndex]) {
                        items[activeIndex].click();
                    } else {
                        searchToLocation(input.value);
                        clearSuggestions();
                    }
                }
            });

            const updateActiveItem = (items) => {
                if (!items.length) return;

                // remove active class from everyone
                Array.from(items).forEach(item => item.classList.remove("autocomplete-active"));

                // loop index if out of bounds
                if (activeIndex >= items.length) activeIndex = 0;
                if (activeIndex < 0) activeIndex = items.length - 1;

                items[activeIndex].classList.add("autocomplete-active");
            };

            // close list when clicking elsewhere
            document.addEventListener("click", (e) => clearSuggestions(e.target));
        };

        // initialize search
        initSearchAutocomplete(document.getElementById("myInput"), locationNames);
    </script>
